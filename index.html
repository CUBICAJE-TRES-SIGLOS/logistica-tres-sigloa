<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TERMINAL CENTRAL // TRES SIGLOS LOGISTICS</title>
    <link rel="icon" type="image/png" href="https://cdn.prod.website-files.com/62b4e3084bb69b3cbd747e80/62b4e344650db7626d857053_TS_ORGINAL_LOGO.png">
    <link rel="shortcut icon" type="image/png" href="https://cdn.prod.website-files.com/62b4e3084bb69b3cbd747e80/62b4e344650db7626d857053_TS_ORGINAL_LOGO.png">
    <link rel="apple-touch-icon" href="https://cdn.prod.website-files.com/62b4e3084bb69b3cbd747e80/62b4e344650db7626d857053_TS_ORGINAL_LOGO.png">
    <style>
        :root {
            --bg-dark: #030308;
            --panel-bg: rgba(10, 15, 30, 0.85);
            --neon-pink: #ff0055;
            --neon-blue: #00f0ff;
            --neon-green: #00ff66;
            --neon-purple: #9d00ff;
            --text-main: #f0f4f8;
            --border-glow: rgba(0, 240, 255, 0.2);
        }

        * { box-sizing: border-box; }

        body {
            background-color: var(--bg-dark);
            background-image: 
                linear-gradient(rgba(0, 240, 255, 0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 240, 255, 0.02) 1px, transparent 1px);
            background-size: 30px 30px;
            color: var(--text-main);
            font-family: monospace;
            margin: 0;
            padding: 15px;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 3px double var(--neon-pink);
            padding-bottom: 10px;
            margin-bottom: 20px;
        }

        h1 {
            font-size: 1.6rem;
            font-weight: 900;
            color: #fff;
            text-shadow: 0 0 10px var(--neon-pink);
            margin: 0;
        }

        .system-status {
            color: var(--neon-green);
            text-shadow: 0 0 8px var(--neon-green);
            font-size: 1rem;
        }

        .role-control-center {
            background: var(--panel-bg);
            border: 1px solid var(--border-glow);
            padding: 15px;
            border-radius: 6px;
            margin-bottom: 25px;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 15px;
        }

        .role-title { color: var(--neon-blue); font-weight: bold; }

        .select-cyber {
            background: #000;
            border: 1px solid var(--neon-blue);
            color: var(--neon-blue);
            padding: 10px 15px;
            font-size: 1.1rem;
            cursor: pointer;
            border-radius: 4px;
            outline: none;
        }

        .view-banner {
            margin-left: auto;
            font-size: 0.9rem;
            background: rgba(0, 255, 102, 0.1);
            padding: 6px 12px;
            border-radius: 4px;
            border: 1px solid var(--neon-green);
            color: var(--neon-green);
        }

        .admin-actions { margin-bottom: 15px; display: flex; justify-content: flex-end; }

        .btn-cyber-add {
            background: transparent;
            border: 1px solid var(--neon-purple);
            color: var(--neon-purple);
            padding: 12px 24px;
            cursor: pointer;
            font-weight: bold;
            text-transform: uppercase;
            clip-path: polygon(0 0, 92% 0, 100% 100%, 8% 100%);
            transition: all 0.3s ease;
        }

        .btn-cyber-add:hover {
            background: rgba(157, 0, 255, 0.2);
            box-shadow: 0 0 15px var(--neon-purple);
            color: #fff;
        }

        .matrix-table-wrapper {
            background: var(--panel-bg);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 8px;
            overflow-x: auto;
        }

        table { width: 100%; border-collapse: collapse; text-align: left; }

        th {
            background: rgba(5, 5, 15, 0.9);
            color: #8fa0dd;
            padding: 16px 12px;
            font-size: 0.85rem;
            border-bottom: 2px solid var(--neon-blue);
        }

        tr { border-bottom: 1px solid rgba(255, 255, 255, 0.05); }

        td { padding: 10px 12px; font-size: 1.1rem; vertical-align: middle; }

        input[type="text"] {
            background: rgba(0, 0, 0, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #fff;
            padding: 8px;
            border-radius: 4px;
            width: 100%;
            outline: none;
        }

        input[type="text"]:focus { border-color: var(--neon-blue); }

        .btn-time-stamp {
            background: linear-gradient(135deg, rgba(0, 240, 255, 0.1), rgba(0, 80, 100, 0.3));
            border: 1px solid var(--neon-blue);
            color: var(--neon-blue);
            padding: 10px 14px;
            font-weight: bold;
            border-radius: 4px;
            cursor: pointer;
            width: 100%;
            text-transform: uppercase;
        }

        .btn-time-stamp:hover { background: var(--neon-blue); color: #000; }

        .btn-time-stamp.stamped {
            background: rgba(57, 255, 20, 0.05);
            border: 1px solid var(--neon-green);
            color: var(--neon-green);
            cursor: not-allowed;
        }

        .highlight-destination { color: var(--neon-blue); font-weight: bold; }

        .btn-action-delete {
            background: transparent;
            border: 1px solid #ff3355;
            color: #ff3355;
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
        }

        .btn-action-delete:hover { background: #ff3355; color: #000; }

        .locked-input { background: transparent !important; border: none !important; color: #a0aec0 !important; pointer-events: none; }

        .row-completed { background: rgba(0, 255, 102, 0.08) !important; border-left: 4px solid var(--neon-green); }
    </style>
</head>
<body>

    <header>
        <div><h1>SISTEMA DIGITAL DE LOGÍSTICA // TRES SIGLOS</h1></div>
        <div class="system-status">● LOCAL_STORAGE_ACTIVE</div>
    </header>

    <div class="role-control-center">
        <span class="role-title">AUTENTICACIÓN DE PUESTO:</span>
        <select class="select-cyber" id="interfaceRole" onchange="ejecutarFiltroDePantalla()">
            <option value="MASTER_ADMIN">ADMINISTRADOR GENERAL (Acceso Total)</option>
            <option value="DANY">OPERADOR DE PATIO: DANY</option>
            <option value="HELADIO">OPERADOR DE PATIO: HELADIO</option>
            <option value="ALDO">OPERADOR DE PATIO: ALDO</option>
        </select>
        <span class="view-banner" id="screenIndicator">VISTA MASTER ACTIVA</span>
    </div>

    <div class="admin-actions" id="adminCommandBlock">
        <button class="btn-cyber-add" onclick="crearNuevoRegistroLocal()">+ Registrar Nuevo Destino</button>
    </div>

    <div class="matrix-table-wrapper">
        <table>
            <thead>
                <tr>
                    <th style="width: 70px;">ORDEN</th>
                    <th>DESTINO</th>
                    <th style="width: 80px;">ALMACÉN</th>
                    <th>CANTIDAD MATERIA</th>
                    <th>UNIDAD DE CARGA / FLOTA</th>
                    <th style="width: 140px;">CARGADOR</th>
                    <th>INICIO CARGA</th>
                    <th>TÉRMINO CARGA</th>
                    <th class="adm-node">ACCIONES</th>
                </tr>
            </thead>
            <tbody id="masterLogisticsBackbone">
            </tbody>
        </table>
    </div><script>
        if (!localStorage.getItem('embarques_locales')) {
            const datosSemilla = {
                "id_1": { orden: "-", destino: "CEDIS QUERETARO", almacen: "10", cantidad: "66 CAMION / 1146 AUTO", unidad: "3S33 JAULA AZUL", cargador: "SIN ASIGNAR", inicio: "", fin: "" },
                "id_2": { orden: "2", destino: "FRANCISCO JAVIER CHIMALHUACAN", almacen: "5", cantidad: "100 AUTO", unidad: "3S29", cargador: "DANY", inicio: "15:05 HRS", fin: "" },
                "id_3": { orden: "-", destino: "JOSE LUIS CHALCO (BODEGA 4)", almacen: "15", cantidad: "632 AUTO", unidad: "3S60 (ALDO)", cargador: "ALDO", inicio: "", fin: "" }
            };
            localStorage.setItem('embarques_locales', JSON.stringify(datosSemilla));
        }

        function cargarMemoriaLocal() {
            const datos = JSON.parse(localStorage.getItem('embarques_locales')) || {};
            const tbody = document.getElementById('masterLogisticsBackbone');
            tbody.innerHTML = '';
            
            Object.keys(datos).forEach(id => {
                const registro = datos[id];
                const fila = document.createElement('tr');
                fila.setAttribute('data-id', id);
                fila.setAttribute('data-operator', registro.cargador.toUpperCase().trim() || 'MASTER_ADMIN');
                
                if(registro.fin) fila.classList.add('row-completed');

                fila.innerHTML = `
                    <td><input type="text" value="${registro.orden}" onchange="actualizarMemoria('${id}', 'orden', this.value)"></td>
                    <td class="highlight-destination"><input type="text" value="${registro.destino}" onchange="actualizarMemoria('${id}', 'destino', this.value)"></td>
                    <td><input type="text" value="${registro.almacen}" onchange="actualizarMemoria('${id}', 'almacen', this.value)"></td>
                    <td><input type="text" value="${registro.cantidad}" onchange="actualizarMemoria('${id}', 'cantidad', this.value)"></td>
                    <td><input type="text" value="${registro.unidad}" onchange="actualizarMemoria('${id}', 'unidad', this.value)"></td>
                    <td><input type="text" class="op-field" value="${registro.cargador}" onchange="actualizarCargador('${id}', this.value)"></td>
                    <td><button class="btn-time-stamp ${registro.inicio ? 'stamped' : ''}" onclick="registrarTiempo('${id}', 'inicio', this)">${registro.inicio ? registro.inicio : 'Marcar Inicio'}</button></td>
                    <td><button class="btn-time-stamp ${registro.fin ? 'stamped' : ''}" onclick="registrarTiempo('${id}', 'fin', this)">${registro.fin ? registro.fin : 'Marcar Fin'}</button></td>
                    <td class="adm-node"><button class="btn-action-delete" onclick="eliminarRegistroLocal('${id}')">BORRAR</button></td>
                `;
                tbody.appendChild(fila);
            });
            ejecutarFiltroDePantalla();
        }

        function crearNuevoRegistroLocal() {
            const datos = JSON.parse(localStorage.getItem('embarques_locales')) || {};
            const nuevoId = "id_" + Date.now();
            datos[nuevoId] = { orden: "-", destino: "NUEVO DESTINO", almacen: "0", cantidad: "0 AUTO", unidad: "POR ASIGNAR", cargador: "SIN ASIGNAR", inicio: "", fin: "" };
            localStorage.setItem('embarques_locales', JSON.stringify(datos));
            cargarMemoriaLocal();
        }

        function actualizarMemoria(id, campo, valor) {
            const datos = JSON.parse(localStorage.getItem('embarques_locales')) || {};
            if(datos[id]) {
                datos[id][campo] = valor;
                localStorage.setItem('embarques_locales', JSON.stringify(datos));
            }
        }

        function actualizarCargador(id, valor) {
            actualizarMemoria(id, 'cargador', valor);
            cargarMemoriaLocal();
        }

        function registrarTiempo(id, tipo, boton) {
            if(boton.classList.contains('stamped')) return;
            const t = new Date();
            const timestamp = `${t.getHours() < 10 ? '0'+t.getHours() : t.getHours()}:${t.getMinutes() < 10 ? '0'+t.getMinutes() : t.getMinutes()} HRS`;
            
            actualizarMemoria(id, tipo, timestamp);
            cargarMemoriaLocal();
        }

        function eliminarRegistroLocal(id) {
            const datos = JSON.parse(localStorage.getItem('embarques_locales')) || {};
            delete datos[id];
            localStorage.setItem('embarques_locales', JSON.stringify(datos));
            cargarMemoriaLocal();
        }

        function ejecutarFiltroDePantalla() {
            const rol = document.getElementById('interfaceRole').value;
            const filas = document.querySelectorAll('#masterLogisticsBackbone tr');
            const blockAdmin = document.getElementById('adminCommandBlock');
            const indicator = document.getElementById('screenIndicator');
            const nodesAdmin = document.querySelectorAll('.adm-node');

            if (rol === 'MASTER_ADMIN') {
                filas.forEach(f => { f.style.display = ''; habilitarFila(f, true); });
                nodesAdmin.forEach(n => n.style.display = '');
                blockAdmin.style.display = 'flex';
                indicator.textContent = "VISTA MASTER ACTIVA";
                indicator.style.color = "var(--neon-green)";
            } else {
                blockAdmin.style.display = 'none';
                nodesAdmin.forEach(n => n.style.display = 'none');
                indicator.textContent = `VISTA OPERADOR // PERFIL: ${rol}`;
                indicator.style.color = "var(--neon-pink)";

                filas.forEach(f => {
                    if (f.getAttribute('data-operator') === rol) {
                        f.style.display = ''; habilitarFila(f, false);
                    } else {
                        f.style.display = 'none';
                    }
                });
            }
        }

        function habilitarFila(f, op) {
            f.querySelectorAll('input').forEach(i => {
                if (op) { i.classList.remove('locked-input'); i.removeAttribute('readonly'); }
                else { i.classList.add('locked-input'); i.setAttribute('readonly', 'true'); }
            });
        }

        window.onload = cargarMemoriaLocal;
    </script>
</body>
</html>
